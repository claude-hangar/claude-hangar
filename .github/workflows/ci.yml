name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Lint shell scripts
        run: |
          echo "=== ShellCheck ==="
          find . -name '*.sh' -not -path './.git/*' -exec shellcheck --severity=warning {} +

  json-validate:
    name: JSON Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
      - name: Validate JSON files
        run: |
          echo "=== JSON Validation ==="
          errors=0
          while IFS= read -r file; do
            if node -e "JSON.parse(require('fs').readFileSync('$file','utf8'))" 2>/dev/null; then
              echo "OK: $file"
            else
              echo "ERROR: $file"
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.json' -not -path './.git/*' -not -path './node_modules/*')
          if [ "$errors" -gt 0 ]; then
            echo "ERROR: $errors JSON file(s) invalid!"
            exit 1
          fi

  secret-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          echo "=== Secret Scan ==="
          PATTERNS=(
            'PRIVATE KEY'
            "password[[:space:]]*[:=][[:space:]]*[\"'][^\"']{8,}"
            "api[_-]?key[[:space:]]*[:=][[:space:]]*[\"'][^\"']{8,}"
            "secret[[:space:]]*[:=][[:space:]]*[\"'][^\"']{8,}"
            "token[[:space:]]*[:=][[:space:]]*[\"'][^\"']{8,}"
          )
          found=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rniE "$pattern" \
              --include='*.json' --include='*.md' --include='*.sh' --include='*.env' \
              --exclude-dir=.git --exclude-dir=tutorials --exclude-dir=phases \
              --exclude-dir=hooks --exclude-dir=templates --exclude-dir=stacks \
              --exclude-dir=agents --exclude-dir=docs --exclude-dir=concepts \
              --exclude-dir=core . 2>/dev/null \
              | grep -v '.gitignore' \
              | grep -v 'SKILL.md' \
              | grep -v 'fix-templates' \
              | grep -v 'CONTRIBUTING' \
              | grep -v 'SECURITY'; then
              echo "WARNING: Potentially sensitive content found (pattern: $pattern)"
              found=1
            fi
          done
          if [ "$found" -eq 0 ]; then
            echo "No secrets found."
          else
            echo ""
            echo "ERROR: Possible secrets in repository!"
            echo "Please verify if these are actual secrets."
            echo "(False positives in documentation are OK — add pattern exclude)"
            exit 1
          fi

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
      - name: Lint markdown files
        run: |
          echo "=== Markdown Lint ==="
          npx --yes markdownlint-cli2 '**/*.md' '#node_modules' '#i18n'
