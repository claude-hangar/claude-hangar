# CI — Node.js
# GitHub Actions workflow for Node.js projects.
# Runs on every push and PR. Checks out code, installs dependencies,
# runs tests, and lints.
#
# Supports timezone-aware cron schedules (March 2026+).
# Example: schedule nightly builds in your timezone:
#   schedule:
#     - cron: '0 2 * * *'
#       timezone: 'Europe/Berlin'
#
# GitHub Agentic Workflows (Technical Preview, Feb 2026):
# Markdown workflow files in .github/workflows/ can be converted to
# Actions YAML via `gh aw` CLI. Evaluate if relevant for your project.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint
